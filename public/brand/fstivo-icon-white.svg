<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes float-small {
        0%, 100% { transform: translateY(0px); opacity: 1; }
        50% { transform: translateY(-2px); opacity: 0.7; }
      }
      .dot-float-small {
        animation: float-small 3s ease-in-out infinite;
      }
    </style>
  </defs>
  
  <!-- White stylized F icon -->
  <path d="M12 8L12 40L20 40L20 28L32 28L32 20L20 20L20 16L36 16L36 8L12 8Z" fill="#ffffff"/>
  
  <!-- Animated dots in white color -->
  <circle cx="30" cy="12" r="2.5" fill="#ffffff" class="dot-float-small" style="animation-delay: 0s;" />
  <circle cx="37" cy="12" r="2.5" fill="#ffffff" class="dot-float-small" style="animation-delay: 0.2s;" />
  <circle cx="44" cy="12" r="2.5" fill="#ffffff" class="dot-float-small" style="animation-delay: 0.4s;" />
</svg>
