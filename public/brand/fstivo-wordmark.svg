<svg viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Fstivo wordmark">
  <defs>
    <linearGradient id="fstivo-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E94C89" />
      <stop offset="50%" stop-color="#D4498E" />
      <stop offset="100%" stop-color="#9B4FCC" />
    </linearGradient>
  </defs>

  <text x="10" y="40" font-size="48" font-weight="800" font-family="Poppins, sans-serif" letter-spacing="-2" fill="url(#fstivo-gradient)">Fstivo</text>

  <!-- Animated dots -->
  <circle cx="185" cy="20" r="4" fill="#E94C89">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="185" cy="30" r="3" fill="#D4498E">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" begin="0.3s" repeatCount="indefinite" />
  </circle>
  <circle cx="185" cy="38" r="2" fill="#9B4FCC">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" begin="0.6s" repeatCount="indefinite" />
  </circle>
</svg>
