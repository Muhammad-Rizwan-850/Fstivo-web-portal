<svg viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes float {
        0%, 100% { transform: translateY(0px); opacity: 1; }
        50% { transform: translateY(-3px); opacity: 0.7; }
      }
      .dot-float {
        animation: float 3s ease-in-out infinite;
      }
    </style>
  </defs>
  
  <!-- Fstivo text in dark color -->
  <text x="10" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#1a1a1a" letter-spacing="-0.5px">
    Fstivo
  </text>
  
  <!-- Animated dots in dark color -->
  <circle cx="155" cy="18" r="4" fill="#1a1a1a" class="dot-float" style="animation-delay: 0s;" />
  <circle cx="165" cy="18" r="4" fill="#1a1a1a" class="dot-float" style="animation-delay: 0.2s;" />
  <circle cx="175" cy="18" r="4" fill="#1a1a1a" class="dot-float" style="animation-delay: 0.4s;" />
</svg>
